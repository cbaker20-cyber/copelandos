name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  node-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run tests
        run: npm test
      - name: Syntax check Worker and local agent files
        run: |
          node --check worker.js
          node --check src/foundationApi.js
          node --check src/vault.js
          node --check local-agent/server.js
          node --check local-agent/actions.js
