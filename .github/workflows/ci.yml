name: CopelandOS CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  node-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        run: npm test

      - name: Syntax checks
        run: |
          node --check worker.js
          node --check src/foundationApi.js
          node --check src/vault.js
          node --check src/hermesAgent.js
          node --check src/automationIntegrations.js
          node --check src/commandCenterHtml.js
          node --check local-agent/server.js
          node --check local-agent/actions.js

      - name: Whitespace diff check
        run: git diff --check
