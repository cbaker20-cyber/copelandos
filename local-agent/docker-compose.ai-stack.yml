services:
  ollama:
    image: ollama/ollama:latest
    container_name: copelandos-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: copelandos-open-webui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: copelandos-litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-copelandos-local-dev-key}
      - OLLAMA_API_BASE=http://ollama:11434
    command: ["--host", "0.0.0.0", "--port", "4000"]
    depends_on:
      - ollama

  qdrant:
    image: qdrant/qdrant:latest
    container_name: copelandos-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant:/qdrant/storage

volumes:
  ollama:
  open-webui:
  qdrant:
